<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fundo circular -->
  <circle cx="256" cy="256" r="256" fill="#1e3c72"/>
  
  <!-- Gradiente para o leão -->
  <defs>
    <linearGradient id="lionGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="cloverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#32CD32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#228B22;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Cabeça do leão -->
  <ellipse cx="256" cy="280" rx="120" ry="100" fill="url(#lionGradient)" stroke="#B8860B" stroke-width="3"/>
  
  <!-- Juba do leão -->
  <g fill="url(#lionGradient)" opacity="0.8">
    <!-- Juba superior -->
    <ellipse cx="256" cy="200" rx="80" ry="60" />
    <ellipse cx="200" cy="220" rx="60" ry="45" />
    <ellipse cx="312" cy="220" rx="60" ry="45" />
    
    <!-- Juba lateral esquerda -->
    <ellipse cx="160" cy="260" rx="45" ry="70" />
    <ellipse cx="140" cy="300" rx="35" ry="50" />
    
    <!-- Juba lateral direita -->
    <ellipse cx="352" cy="260" rx="45" ry="70" />
    <ellipse cx="372" cy="300" rx="35" ry="50" />
    
    <!-- Juba inferior -->
    <ellipse cx="220" cy="360" rx="40" ry="30" />
    <ellipse cx="292" cy="360" rx="40" ry="30" />
  </g>
  
  <!-- Orelhas -->
  <ellipse cx="210" cy="230" rx="25" ry="35" fill="url(#lionGradient)" stroke="#B8860B" stroke-width="2"/>
  <ellipse cx="302" cy="230" rx="25" ry="35" fill="url(#lionGradient)" stroke="#B8860B" stroke-width="2"/>
  
  <!-- Parte interna das orelhas -->
  <ellipse cx="210" cy="235" rx="15" ry="20" fill="#FFB347"/>
  <ellipse cx="302" cy="235" rx="15" ry="20" fill="#FFB347"/>
  
  <!-- Olhos -->
  <ellipse cx="230" cy="260" rx="15" ry="20" fill="#000"/>
  <ellipse cx="282" cy="260" rx="15" ry="20" fill="#000"/>
  
  <!-- Brilho nos olhos -->
  <ellipse cx="235" cy="255" rx="5" ry="8" fill="#FFF"/>
  <ellipse cx="287" cy="255" rx="5" ry="8" fill="#FFF"/>
  
  <!-- Nariz -->
  <ellipse cx="256" cy="290" rx="8" ry="6" fill="#000"/>
  
  <!-- Boca -->
  <path d="M 256 305 Q 240 315 225 310" stroke="#000" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 256 305 Q 272 315 287 310" stroke="#000" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Bigodes -->
  <line x1="180" y1="285" x2="220" y2="290" stroke="#000" stroke-width="2" stroke-linecap="round"/>
  <line x1="180" y1="295" x2="220" y2="295" stroke="#000" stroke-width="2" stroke-linecap="round"/>
  <line x1="180" y1="305" x2="220" y2="300" stroke="#000" stroke-width="2" stroke-linecap="round"/>
  
  <line x1="292" y1="290" x2="332" y2="285" stroke="#000" stroke-width="2" stroke-linecap="round"/>
  <line x1="292" y1="295" x2="332" y2="295" stroke="#000" stroke-width="2" stroke-linecap="round"/>
  <line x1="292" y1="300" x2="332" y2="305" stroke="#000" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Trevos da sorte (esquerda) -->
  <g transform="translate(80, 120)">
    <!-- Trevo 1 -->
    <g fill="url(#cloverGradient)">
      <circle cx="20" cy="15" r="8"/>
      <circle cx="35" cy="15" r="8"/>
      <circle cx="27.5" cy="5" r="8"/>
      <circle cx="27.5" cy="25" r="8"/>
      <rect x="26" y="25" width="3" height="15" fill="#228B22"/>
    </g>
  </g>
  
  <!-- Trevos da sorte (direita) -->
  <g transform="translate(380, 120)">
    <!-- Trevo 2 -->
    <g fill="url(#cloverGradient)">
      <circle cx="20" cy="15" r="8"/>
      <circle cx="35" cy="15" r="8"/>
      <circle cx="27.5" cy="5" r="8"/>
      <circle cx="27.5" cy="25" r="8"/>
      <rect x="26" y="25" width="3" height="15" fill="#228B22"/>
    </g>
  </g>
  
  <!-- Trevos menores (decorativos) -->
  <g transform="translate(120, 380)">
    <g fill="url(#cloverGradient)" opacity="0.7">
      <circle cx="15" cy="12" r="6"/>
      <circle cx="25" cy="12" r="6"/>
      <circle cx="20" cy="5" r="6"/>
      <circle cx="20" cy="19" r="6"/>
      <rect x="19" y="19" width="2" height="10" fill="#228B22"/>
    </g>
  </g>
  
  <g transform="translate(350, 380)">
    <g fill="url(#cloverGradient)" opacity="0.7">
      <circle cx="15" cy="12" r="6"/>
      <circle cx="25" cy="12" r="6"/>
      <circle cx="20" cy="5" r="6"/>
      <circle cx="20" cy="19" r="6"/>
      <rect x="19" y="19" width="2" height="10" fill="#228B22"/>
    </g>
  </g>
  
  <!-- Texto "M" estilizado (inicial de Milionários) -->
  <text x="256" y="450" font-family="Arial Black, sans-serif" font-size="60" font-weight="bold" text-anchor="middle" fill="#FFD700" stroke="#FFA500" stroke-width="2">M</text>
</svg>