name: Notificações Milionários da Leograf

on:
  schedule:
    # Notificações diárias (horário de Brasília = UTC-3)
    - cron: '0 13 * * *'    # 10:00 BRT
    - cron: '20 16 * * *'   # 13:20 BRT
    - cron: '0 18 * * *'    # 15:00 BRT
    # Verificar resultado Lotofácil (sorteio ~20:00 BRT, seg-sáb)
    - cron: '5 23 * * 1-6'  # 20:05 BRT, seg-sáb
    - cron: '35 23 * * 1-6' # 20:35 BRT, seg-sáb
    - cron: '5 0 * * 2-7'   # 21:05 BRT, ter-dom (cobre sorteio da véspera)
  workflow_dispatch:         # Permite disparar manualmente pelo GitHub

# Necessário para ler/salvar cache do Actions (evitar notificação dupla)
permissions:
  actions: write

jobs:
  notificar:
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────────────────────────
      # 1. NOTIFICAÇÃO DE HORÁRIO AGENDADO (10:00 / 13:05 / 15:00 BRT)
      # ─────────────────────────────────────────────────────────────
      - name: Notificação horário agendado
        if: |
          github.event.schedule == '0 13 * * *' ||
          github.event.schedule == '20 16 * * *' ||
          github.event.schedule == '0 18 * * *'
        env:
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}
          APP_URL: ${{ vars.APP_URL }}
        run: |
          SCHEDULE="${{ github.event.schedule }}"
          case "$SCHEDULE" in
            "0 13 * * *")  HORA="10:00" ;;
            "20 16 * * *") HORA="13:20" ;;
            "0 18 * * *")  HORA="15:00" ;;
            *) echo "Cron não reconhecido; saindo."; exit 0 ;;
          esac

          echo "Enviando notificação de horário: $HORA BRT"
          curl -sf -X POST "https://onesignal.com/api/v1/notifications" \
            -H "Content-Type: application/json; charset=utf-8" \
            -H "Authorization: Basic $ONESIGNAL_API_KEY" \
            -d "{
              \"app_id\": \"$ONESIGNAL_APP_ID\",
              \"included_segments\": [\"Subscribed Users\"],
              \"headings\": {\"pt\": \"🦁 Milionários da Leograf\"},
              \"contents\": {\"pt\": \"⏰ ${HORA}h — Abra o app para ver seus resultados!\"},
              \"url\": \"${APP_URL}\",
              \"chrome_web_icon\": \"${APP_URL}logo.svg\"
            }" \
            && echo "Notificação enviada com sucesso." \
            || echo "Aviso: falha ao enviar (talvez nenhum assinante ainda)."

      # ─────────────────────────────────────────────────────────────
      # 2. VERIFICAR RESULTADO LOTOFÁCIL
      # ─────────────────────────────────────────────────────────────
      - name: Buscar resultado Lotofácil
        if: |
          github.event.schedule == '5 23 * * 1-6'  ||
          github.event.schedule == '35 23 * * 1-6' ||
          github.event.schedule == '5 0 * * 2-7'   ||
          github.event_name == 'workflow_dispatch'
        id: resultado
        run: |
          RESULT=$(curl -sf --connect-timeout 15 \
            "https://servicebus2.caixa.gov.br/portaldeloterias/api/lotofacil" || echo "")

          if [ -z "$RESULT" ]; then
            echo "API da Caixa indisponível. Saindo."
            echo "numero=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CONCURSO=$(echo "$RESULT" | jq -r '.numero // empty')
          NUMEROS=$(echo  "$RESULT" | jq -r '[.listaDezenas // [] | .[]] | join(" - ")')
          DATA=$(echo     "$RESULT" | jq -r '.dataApuracao // empty')

          if [ -z "$CONCURSO" ]; then
            echo "Resultado inválido. Saindo."
            echo "numero=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Resultado encontrado: Concurso $CONCURSO ($DATA) - $NUMEROS"
          echo "numero=$CONCURSO"  >> "$GITHUB_OUTPUT"
          echo "numeros=$NUMEROS"  >> "$GITHUB_OUTPUT"
          echo "data=$DATA"        >> "$GITHUB_OUTPUT"

      - name: Verificar se este concurso já foi notificado
        if: steps.resultado.outputs.numero != ''
        id: cache
        uses: actions/cache@v4
        with:
          path: .notification-cache
          key: lotofacil-notificado-${{ steps.resultado.outputs.numero }}
          lookup-only: true

      - name: Enviar notificação de resultado novo
        if: |
          steps.resultado.outputs.numero != '' &&
          steps.cache.outputs.cache-hit != 'true'
        env:
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}
          APP_URL: ${{ vars.APP_URL }}
        run: |
          CONCURSO="${{ steps.resultado.outputs.numero }}"
          NUMEROS="${{ steps.resultado.outputs.numeros }}"
          DATA="${{ steps.resultado.outputs.data }}"

          echo "Notificando resultado do concurso $CONCURSO..."
          curl -sf -X POST "https://onesignal.com/api/v1/notifications" \
            -H "Content-Type: application/json; charset=utf-8" \
            -H "Authorization: Basic $ONESIGNAL_API_KEY" \
            -d "{
              \"app_id\": \"$ONESIGNAL_APP_ID\",
              \"included_segments\": [\"Subscribed Users\"],
              \"headings\": {\"pt\": \"🍀 Resultado Lotofácil!\"},
              \"contents\": {\"pt\": \"Concurso ${CONCURSO} • ${DATA}\\n🎲 ${NUMEROS}\\n👆 Toque para ver seus acertos!\"},
              \"url\": \"${APP_URL}\",
              \"chrome_web_icon\": \"${APP_URL}logo.svg\",
              \"priority\": 10,
              \"android_visibility\": 1
            }" \
            && echo "Notificação enviada!" \
            || echo "Aviso: falha ao enviar notificação."

          mkdir -p .notification-cache
          echo "$CONCURSO" > .notification-cache/last-notificado

      - name: Salvar cache (evitar re-notificação)
        if: |
          steps.resultado.outputs.numero != '' &&
          steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .notification-cache
          key: lotofacil-notificado-${{ steps.resultado.outputs.numero }}
