name: Notificações Milionários da Leograf

# ─────────────────────────────────────────────────────────────────────────────
# COMO FUNCIONA:
#   GitHub Actions roda nos horários exatos abaixo e usa a API do OneSignal
#   para enviar push para todos os celulares com o app instalado,
#   MESMO COM O APP FECHADO.
#
# PRÉ-REQUISITO — configure APENAS UM secret no repositório do GitHub:
#   Settings → Secrets and variables → Actions → New repository secret
#   ┌─ Secret obrigatório ─────────────────────────────────────────────────
#   │  ONESIGNAL_REST_API_KEY   → REST API Key do OneSignal
#   └──────────────────────────────────────────────────────────────────────
#   (App ID e URL do site já estão hardcoded abaixo — não precisam ser secrets)
#
# Como obter a REST API Key do OneSignal:
#   1. Acesse https://onesignal.com e faça login
#   2. Selecione seu App → Settings → Keys & IDs
#   3. Copie o campo "REST API Key" e adicione como secret ONESIGNAL_REST_API_KEY
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # ── Lembretes diários (todos os dias) ──────── Horário de Brasília = UTC-3
    - cron: '0 13 * * *'    # 10:00 BRT — lembrete matinal
    - cron: '0 18 * * *'    # 15:00 BRT — lembrete tarde
    - cron: '0 21 * * *'    # 18:00 BRT — lembrete noite
    # ── Resultado Lotofácil (sorteio ~20:00 BRT, segunda a sábado) ───────────
    - cron: '35 23 * * 1-6' # 20:35 BRT seg-sáb — 1ª tentativa (logo após sorteio)
    - cron: '30 0 * * 2-7'  # 21:30 BRT seg-sáb — 2ª tentativa (resultado consolidado)
    - cron: '0 1 * * 2-7'   # 22:00 BRT seg-sáb — 3ª tentativa (fallback)
  workflow_dispatch:          # Permite disparar manualmente pelo GitHub Actions

permissions:
  actions: write

jobs:
  notificar:
    runs-on: ubuntu-latest

    steps:
      # ═══════════════════════════════════════════════════════════════════════
      # PASSO 1 — LEMBRETE DE HORÁRIO (10:00 / 15:00 / 18:00 BRT)
      # Notifica todos os assinantes para abrirem o app
      # ═══════════════════════════════════════════════════════════════════════
      - name: Notificação de horário agendado
        if: |
          github.event.schedule == '0 13 * * *' ||
          github.event.schedule == '0 18 * * *' ||
          github.event.schedule == '0 21 * * *'
        env:
          ONESIGNAL_APP_ID: "9fc449ea-ce6f-462d-a3eb-1476569c151b"
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}
          APP_URL: "https://delima20k.github.io/milionarios-da-leograf0.1/"
        run: |
          if [ -z "$ONESIGNAL_API_KEY" ]; then
            echo "⚠️  ONESIGNAL_REST_API_KEY não configurado. Vá em Settings → Secrets no GitHub."
            exit 1
          fi

          SCHEDULE="${{ github.event.schedule }}"
          case "$SCHEDULE" in
            "0 13 * * *") HORA="10:00" EMOJI="🌅" ;;
            "0 18 * * *") HORA="15:00" EMOJI="☀️"  ;;
            "0 21 * * *") HORA="18:00" EMOJI="🌆"  ;;
            *) echo "Cron não reconhecido; saindo."; exit 0 ;;
          esac

          echo "📣 Enviando lembrete das ${HORA}h BRT..."
          HTTP=$(curl -s -o /tmp/os_resp.json -w "%{http_code}" \
            -X POST "https://onesignal.com/api/v1/notifications" \
            -H "Content-Type: application/json; charset=utf-8" \
            -H "Authorization: Basic $ONESIGNAL_API_KEY" \
            -d "{
              \"app_id\": \"$ONESIGNAL_APP_ID\",
              \"included_segments\": [\"Subscribed Users\"],
              \"headings\": {\"pt\": \"🦁 Milionários da Leograf\"},
              \"contents\": {\"pt\": \"${EMOJI} ${HORA}h — Abra o app e verifique seus resultados!\"},
              \"url\": \"${APP_URL}?autoVerificar=1\",
              \"chrome_web_icon\": \"${APP_URL}logo-header.png\",
              \"firefox_icon\":    \"${APP_URL}logo-header.png\",
              \"small_icon\":      \"logo-header\"
            }")
          echo "HTTP $HTTP — $(cat /tmp/os_resp.json)"
          [ "$HTTP" = "200" ] && echo "✅ Lembrete enviado!" || echo "⚠️  Falha ao enviar (HTTP $HTTP)"

      # ═══════════════════════════════════════════════════════════════════════
      # PASSO 2 — BUSCAR RESULTADO DA LOTOFÁCIL NA API DA CAIXA
      # Rodado nos crons de 20:35 / 21:30 / 22:00 BRT
      # ═══════════════════════════════════════════════════════════════════════
      - name: Buscar resultado Lotofácil
        if: |
          github.event.schedule == '35 23 * * 1-6' ||
          github.event.schedule == '30 0 * * 2-7'  ||
          github.event.schedule == '0 1 * * 2-7'   ||
          github.event_name == 'workflow_dispatch'
        id: resultado
        run: |
          echo "🔍 Consultando API da Caixa..."
          RESULT=$(curl -sf --connect-timeout 20 --max-time 30 \
            -H "Accept: application/json" \
            "https://servicebus2.caixa.gov.br/portaldeloterias/api/lotofacil" || echo "")

          if [ -z "$RESULT" ]; then
            echo "❌ API da Caixa indisponível."
            echo "numero=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CONCURSO=$(echo "$RESULT" | jq -r '.numero // empty')
          NUMEROS=$(echo  "$RESULT" | jq -r '.listaDezenas // [] | join(" - ")')
          DATA=$(echo     "$RESULT" | jq -r '.dataApuracao // empty')
          QTD=$(echo      "$RESULT" | jq -r '.listaDezenas // [] | length')

          if [ -z "$CONCURSO" ] || [ "$QTD" -lt 15 ]; then
            echo "⚠️  Resultado inválido ou incompleto ($QTD números). Caixa ainda não publicou."
            echo "numero=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "✅ Concurso $CONCURSO ($DATA): $NUMEROS"
          printf 'numero=%s\n'  "$CONCURSO" >> "$GITHUB_OUTPUT"
          printf 'numeros=%s\n' "$NUMEROS"  >> "$GITHUB_OUTPUT"
          printf 'data=%s\n'    "$DATA"     >> "$GITHUB_OUTPUT"

      # ═══════════════════════════════════════════════════════════════════════
      # PASSO 3 — VERIFICAR SE ESTE CONCURSO JÁ FOI NOTIFICADO (evita dupla)
      # ═══════════════════════════════════════════════════════════════════════
      - name: Verificar se este concurso já foi notificado
        if: steps.resultado.outputs.numero != ''
        id: cache
        uses: actions/cache@v4
        with:
          path: .notification-cache
          key: lotofacil-notificado-${{ steps.resultado.outputs.numero }}
          lookup-only: true

      # ═══════════════════════════════════════════════════════════════════════
      # PASSO 4 — ENVIAR PUSH COM O RESULTADO (todos os assinantes)
      # Inclui os números sorteados e o link para conferir os jogos
      # ═══════════════════════════════════════════════════════════════════════
      - name: Enviar push com resultado novo
        if: |
          steps.resultado.outputs.numero != '' &&
          steps.cache.outputs.cache-hit != 'true'
        env:
          ONESIGNAL_APP_ID: "9fc449ea-ce6f-462d-a3eb-1476569c151b"
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}
          APP_URL: "https://delima20k.github.io/milionarios-da-leograf0.1/"
        run: |
          if [ -z "$ONESIGNAL_API_KEY" ]; then
            echo "⚠️  ONESIGNAL_REST_API_KEY não configurado. Vá em Settings → Secrets no GitHub."
            exit 1
          fi

          CONCURSO="${{ steps.resultado.outputs.numero }}"
          NUMEROS="${{ steps.resultado.outputs.numeros }}"
          DATA="${{ steps.resultado.outputs.data }}"

          echo "📣 Notificando resultado do concurso $CONCURSO..."
          HTTP=$(curl -s -o /tmp/os_resp.json -w "%{http_code}" \
            -X POST "https://onesignal.com/api/v1/notifications" \
            -H "Content-Type: application/json; charset=utf-8" \
            -H "Authorization: Basic $ONESIGNAL_API_KEY" \
            -d "{
              \"app_id\": \"$ONESIGNAL_APP_ID\",
              \"included_segments\": [\"Subscribed Users\"],
              \"headings\": {\"pt\": \"🍀 Resultado Lotofácil — Concurso ${CONCURSO}!\"},
              \"contents\": {\"pt\": \"📅 ${DATA}\\n🎲 ${NUMEROS}\\n\\n👆 Toque para ver seus acertos!\"},
              \"url\": \"${APP_URL}?autoVerificar=1\",
              \"chrome_web_icon\": \"${APP_URL}logo-header.png\",
              \"firefox_icon\":    \"${APP_URL}logo-header.png\",
              \"small_icon\":      \"logo-header\",
              \"priority\": 10,
              \"android_visibility\": 1,
              \"ttl\": 86400
            }")
          echo "HTTP $HTTP — $(cat /tmp/os_resp.json)"
          [ "$HTTP" = "200" ] && echo "✅ Push de resultado enviado!" || echo "⚠️  Falha (HTTP $HTTP)"

          mkdir -p .notification-cache
          echo "$CONCURSO" > .notification-cache/last-notificado

      # ═══════════════════════════════════════════════════════════════════════
      # PASSO 5 — SALVAR CACHE para não notificar o mesmo concurso duas vezes
      # ═══════════════════════════════════════════════════════════════════════
      - name: Salvar cache (evitar re-notificação)
        if: |
          steps.resultado.outputs.numero != '' &&
          steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .notification-cache
          key: lotofacil-notificado-${{ steps.resultado.outputs.numero }}
